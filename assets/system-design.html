<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDD System Design Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; white-space: nowrap; }
    header .actions { display: flex; gap: 8px; align-items: center; }
    button { background: #238636; border: none; color: #fff; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #2ea043; }
    button.secondary { background: #30363d; }
    button.secondary:hover { background: #484f58; }
    #file-input { display: none; }
    .container { display: flex; flex: 1; overflow: hidden; }
    .editor-pane { width: 40%; min-width: 300px; display: flex; flex-direction: column; border-right: 1px solid #30363d; }
    .editor-pane.collapsed { width: 0; min-width: 0; overflow: hidden; border-right: none; }
    .preview-pane { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; background: #0d1117; }
    textarea { flex: 1; background: #0d1117; color: #c9d1d9; border: none; padding: 16px; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }
    textarea::placeholder { color: #484f58; }
    #diagram-output { background: #fff; border-radius: 8px; padding: 20px; max-width: 100%; }
    #diagram-output svg { max-width: 100%; height: auto; }
    .error-msg { color: #f85149; background: #1c1210; border: 1px solid #f8514933; border-radius: 6px; padding: 12px 16px; font-size: 13px; max-width: 600px; }
    .placeholder { color: #484f58; font-size: 14px; text-align: center; line-height: 1.8; }
    .status { font-size: 12px; color: #8b949e; padding: 6px 16px; background: #161b22; border-top: 1px solid #30363d; }
  </style>
</head>
<body>
  <header>
    <h1>IDD System Design Viewer</h1>
    <div class="actions">
      <button id="load-btn" class="secondary">Load .mmd file</button>
      <input type="file" id="file-input" accept=".mmd,.mermaid,.md,.txt">
      <button id="render-btn">Render</button>
      <button id="toggle-btn" class="secondary">Toggle Editor</button>
      <button id="export-svg-btn" class="secondary">Export SVG</button>
      <button id="export-png-btn" class="secondary">Export PNG</button>
    </div>
  </header>
  <div class="container">
    <div class="editor-pane" id="editor-pane">
      <textarea id="mermaid-input" placeholder="Paste your Mermaid diagram code here...

Example:
graph TD
    A[User Request] --> B[Decompose]
    B --> C[Options]
    C --> D[Decide]
    D --> E[Implement]" spellcheck="false"></textarea>
      <div class="status" id="status">Ready</div>
    </div>
    <div class="preview-pane" id="preview-pane">
      <div class="placeholder">
        Paste Mermaid code in the editor and click Render,<br>
        or load a .mmd file generated by <code>idd diagram</code>
      </div>
    </div>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
    });

    const input = document.getElementById('mermaid-input');
    const preview = document.getElementById('preview-pane');
    const status = document.getElementById('status');
    const editorPane = document.getElementById('editor-pane');
    let renderCounter = 0;

    async function renderDiagram() {
      const code = input.value.trim();
      if (!code) {
        preview.innerHTML = '<div class="placeholder">Enter Mermaid code to render</div>';
        status.textContent = 'No input';
        return;
      }

      status.textContent = 'Rendering...';
      try {
        renderCounter++;
        const id = `mermaid-diagram-${renderCounter}`;
        const { svg } = await mermaid.render(id, code);
        preview.innerHTML = `<div id="diagram-output">${svg}</div>`;
        status.textContent = `Rendered successfully (${code.split('\n').length} lines)`;
      } catch (err) {
        preview.innerHTML = `<div class="error-msg">Render error: ${err.message}</div>`;
        status.textContent = 'Render failed';
      }
    }

    // Render button
    document.getElementById('render-btn').addEventListener('click', renderDiagram);

    // Ctrl+Enter to render
    input.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        renderDiagram();
      }
    });

    // Load file
    document.getElementById('load-btn').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        let content = ev.target.result;
        // Extract mermaid code block from markdown if needed
        const mermaidBlock = content.match(/```mermaid\n([\s\S]*?)```/);
        if (mermaidBlock) {
          content = mermaidBlock[1].trim();
        }
        input.value = content;
        status.textContent = `Loaded: ${file.name}`;
        renderDiagram();
      };
      reader.readAsText(file);
    });

    // Toggle editor
    document.getElementById('toggle-btn').addEventListener('click', () => {
      editorPane.classList.toggle('collapsed');
    });

    // Export SVG
    document.getElementById('export-svg-btn').addEventListener('click', () => {
      const svgEl = preview.querySelector('svg');
      if (!svgEl) { alert('No diagram to export. Render first.'); return; }
      const svgData = new XMLSerializer().serializeToString(svgEl);
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'system-design.svg';
      a.click();
      URL.revokeObjectURL(url);
    });

    // Export PNG
    document.getElementById('export-png-btn').addEventListener('click', () => {
      const svgEl = preview.querySelector('svg');
      if (!svgEl) { alert('No diagram to export. Render first.'); return; }
      const svgData = new XMLSerializer().serializeToString(svgEl);
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width * 2;
        canvas.height = img.height * 2;
        ctx.scale(2, 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'system-design.png';
          a.click();
          URL.revokeObjectURL(url);
        }, 'image/png');
      };
      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    });

    // Auto-render if URL has ?code= parameter
    const params = new URLSearchParams(window.location.search);
    const codeParam = params.get('code');
    if (codeParam) {
      input.value = decodeURIComponent(codeParam);
      renderDiagram();
    }
  </script>
</body>
</html>
